services:

  pg:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dating_api
    environment:
      APP_CONFIG__DB__URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pg:5432/${POSTGRES_DB}
      APP_CONFIG__DB__ECHO: "false"
      APP_CONFIG__DB__POOL_SIZE: "50"
      APP_CONFIG__DB__MAX_OVERFLOW: "10"
      APP_CONFIG__ACCESS_TOKEN__LIFETIME_SECONDS: "${APP_CONFIG__ACCESS_TOKEN__LIFETIME_SECONDS:-3600}"
      APP_CONFIG__ACCESS_TOKEN__RESET_PASSWORD_TOKEN_SECRET: ${APP_CONFIG__ACCESS_TOKEN__RESET_PASSWORD_TOKEN_SECRET}
      APP_CONFIG__ACCESS_TOKEN__VERIFICATION_TOKEN_SECRET: ${APP_CONFIG__ACCESS_TOKEN__VERIFICATION_TOKEN_SECRET}
      APP_CONFIG__RUN__HOST: 0.0.0.0
      APP_CONFIG__RUN__PORT: "8000"
      APP_CONFIG__GUNICORN__HOST: 0.0.0.0
      APP_CONFIG__GUNICORN__PORT: "8000"
      APP_CONFIG__GUNICORN__WORKERS: "2"
      APP_CONFIG__GUNICORN__TIMEOUT: "90"
      APP_CONFIG__LOGGING__LOG_LEVEL: info
      APP_CONFIG__SECRET_KEY: ${APP_CONFIG__SECRET_KEY}
      APP_CONFIG__REDIS_URL: redis://redis:6379
      APP_CONFIG__CORS__ALLOWED_ORIGINS: ${APP_CONFIG__CORS__ALLOWED_ORIGINS}
      APP_CONFIG__API__PREFIX: /api
    volumes:
      - photos:/app/static/photos
    depends_on:
      pg:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/docs\")'"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    container_name: dating_bot
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      WEBAPP_URL: ${WEBAPP_URL}
      REDIS_URL: redis://redis:6379
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: dating_web
    depends_on:
      - api
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: dating_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - api
      - web
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  pg_data:
  redis_data:
  photos:
  certbot_conf:
  certbot_www:
